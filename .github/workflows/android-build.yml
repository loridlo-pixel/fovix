name: Android CI (SAFE BUILD)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🔴 1. GRADLE SYNC CHECK (без APK)
      - name: Gradle configuration check
        run: ./gradlew tasks --no-daemon

      # 🔴 2. COMPILE CHECK (самое важное)
      - name: Compile Kotlin (NO APK)
        run: ./gradlew compileDebugKotlin --stacktrace

      # 🔴 3. RESOURCE + MANIFEST CHECK
      - name: Validate resources
        run: ./gradlew processDebugResources --stacktrace

      # 🔵 4. FULL BUILD ONLY IF ABOVE OK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 📦 5. ARTIFACT
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk