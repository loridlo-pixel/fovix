name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🔥 ЖЁСТКАЯ ОЧИСТКА КЭША
      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          rm -rf ~/.gradle/wrapper
          rm -rf .gradle
          rm -rf android/.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clean project
        run: cd android && ./gradlew clean --no-daemon

      # 🔥 СБОРКА БЕЗ КЭША
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --no-build-cache --refresh-dependencies

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk